# ── Servidor ──────────────────────────────────────────────────
server.port=8080

# ── CORS: permite peticiones desde el frontend (Live Server) ──
laese.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000

# ── PostgreSQL + JPA ──────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/laese_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# Crea/actualiza las tablas automáticamente al arrancar
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en consola (útil para depurar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto PostgreSQL (Spring Boot 3 lo detecta solo, pero lo dejamos explícito)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
